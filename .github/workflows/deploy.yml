name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ] # 如果你的預設分支是 master，請改成 master

permissions:
  contents: read
  pages: write
  id-token: write

# 加入這個環境變數，強制所有 Actions 使用 Node.js 24 來消除警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24 # 將這裡從 20 改為 24
      - run: npm install
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
